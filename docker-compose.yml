version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: slpvt_postgres
    environment:
      POSTGRES_DB: slpvt_dev
      POSTGRES_USER: slpvt_user
      POSTGRES_PASSWORD: Pubudu123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    container_name: slpvt_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: