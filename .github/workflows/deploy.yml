name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "================================================================"
            echo " SLPVT DEPLOYMENT STARTED"
            echo " $(date '+%Y-%m-%d %H:%M:%S')"
            echo "================================================================"

            echo ""
            echo ">>> [1/9] Pulling latest code from main..."
            if [ ! -d "/home/ec2-user/Deployments/slpvt-backend/.git" ]; then
              echo "    Repo not found — cloning for the first time..."
              mkdir -p /home/ec2-user/Deployments
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Pamod45/slpvt-backend.git /home/ec2-user/Deployments/slpvt-backend || { echo "    Clone failed — aborting deployment"; exit 1; }
              echo "    Cloned successfully"
            else
              echo "    Repo found — fetching latest changes..."
              cd /home/ec2-user/Deployments/slpvt-backend
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Pamod45/slpvt-backend.git
              git fetch origin main
              git reset --hard origin/main
            fi
            cd /home/ec2-user/Deployments/slpvt-backend/api
            echo "    Done — $(git log -1 --format='%h %s')"

            echo ""
            echo ">>> [2/9] Installing dependencies..."
            npm install --legacy-peer-deps
            echo "    Done"

            echo ""
            echo ">>> [3/9] Writing .env from secrets..."
            cat > .env << 'ENVEOF'
            NODE_ENV=production
            PORT=${{ secrets.PORT }}
            PG_HOST=${{ secrets.PG_HOST }}
            PG_PORT=${{ secrets.PG_PORT }}
            PG_DB=${{ secrets.PG_DB }}
            PG_USER=${{ secrets.PG_USER }}
            PG_PASSWORD=${{ secrets.PG_PASSWORD }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
            JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN }}
            ENVEOF
            echo "    Done"

            echo ""
            echo ">>> [4/9] Running PostgreSQL migrations..."
            npx knex migrate:latest
            echo "    Done"

            echo ""
            echo ">>> [5/9] Checking PostgreSQL seed data..."
            EXISTING=$(PGPASSWORD=${{ secrets.PG_PASSWORD }} psql \
              -h ${{ secrets.PG_HOST }} \
              -U ${{ secrets.PG_USER }} \
              -d ${{ secrets.PG_DB }} \
              -t -c "SELECT COUNT(*) FROM provinces;" 2>/dev/null | tr -d ' ')

            if [ "$EXISTING" = "0" ] || [ -z "$EXISTING" ]; then
              echo "    Provinces table is empty — running seeds..."
              npm run seed
              echo "    Seeds complete"
            else
              echo "    Provinces table already has $EXISTING rows — skipping seeds"
            fi

            echo ""
            echo ">>> [6/9] Checking MongoDB district boundaries..."
            DISTRICT_COUNT=$(node --input-type=module << 'JSEOF'
            import mongoose from './node_modules/mongoose/index.js'
            import 'dotenv/config'
            await mongoose.connect(process.env.MONGO_URI)
            const count = await mongoose.connection.db.collection('districts').countDocuments()
            console.log(count)
            await mongoose.disconnect()
            JSEOF
            )

            if [ "$DISTRICT_COUNT" = "0" ] || [ -z "$DISTRICT_COUNT" ]; then
              echo "    districts collection is empty — seeding district boundaries..."
              node scripts/seedDistrictBoundaries.js
              echo "    District boundaries seeded"
            else
              echo "    districts collection already has $DISTRICT_COUNT records — skipping"
            fi

            echo ""
            echo ">>> [7/9] Checking MongoDB DS division boundaries..."
            DS_COUNT=$(node --input-type=module << 'JSEOF'
            import mongoose from './node_modules/mongoose/index.js'
            import 'dotenv/config'
            await mongoose.connect(process.env.MONGO_URI)
            const count = await mongoose.connection.db.collection('divisional_secretariats').countDocuments()
            console.log(count)
            await mongoose.disconnect()
            JSEOF
            )

            if [ "$DS_COUNT" = "0" ] || [ -z "$DS_COUNT" ]; then
              echo "    divisional_secretariats collection is empty — seeding DS boundaries..."
              node scripts/seedDSBoundaries.js
              echo "    DS boundaries seeded"
            else
              echo "    divisional_secretariats collection already has $DS_COUNT records — skipping"
            fi

            echo ""
            echo ">>> [8/9] Checking MongoDB location pings..."
            PING_COUNT=$(node --input-type=module << 'JSEOF'
            import mongoose from './node_modules/mongoose/index.js'
            import 'dotenv/config'
            await mongoose.connect(process.env.MONGO_URI)
            const count = await mongoose.connection.db.collection('location_pings').countDocuments()
            console.log(count)
            await mongoose.disconnect()
            JSEOF
            )

            if [ "$PING_COUNT" -lt 1000000 ] 2>/dev/null; then
              echo "    location_pings has $PING_COUNT records (< 1M) — running ping simulator..."
              node scripts/pingSimulator.js
              echo "    Ping simulation complete"
            else
              echo "    location_pings already has $PING_COUNT records — skipping simulator"
            fi

            echo ""
            echo ">>> [9/9] Restarting API process and Nginx..."
            if pm2 describe slpvt-api > /dev/null 2>&1; then
              pm2 restart slpvt-api
              echo "    PM2 process restarted"
            else
              pm2 start src/server.js --name slpvt-api
              echo "    PM2 process started fresh"
            fi
            pm2 save
            sudo systemctl restart nginx
            echo "    Nginx restarted"

            echo ""
            echo "================================================================"
            echo " DEPLOYMENT COMPLETE — $(date '+%Y-%m-%d %H:%M:%S')"
            echo "================================================================"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo ""
            echo ">>> Health check..."
            sleep 5
            curl -f http://localhost:3000/api/v1/ && echo "    Health check passed" || echo "    Health check failed"
