  /vehicles/{registrationNumber}/location-history:
    get:
      tags: [Vehicles]
      summary: Get location history for a vehicle
      description: Returns a paginated trail of GPS pings for a vehicle. Defaults to the last 1 hour when from and to are omitted. Maximum window is 30 days. Adding lat, lng and radius (all required together) filters to pings within that radius of the given point.
      security:
        - BearerAuth: []
      parameters:
        - name: registrationNumber
          in: path
          required: true
          schema:
            type: string
          example: WP AAB-1234
        - name: from
          in: query
          description: Start of time window (ISO 8601). Defaults to 1 hour before to.
          schema:
            type: string
            format: date-time
            example: "2026-04-25T00:00:00Z"
        - name: to
          in: query
          description: End of time window (ISO 8601). Defaults to now.
          schema:
            type: string
            format: date-time
            example: "2026-04-26T00:00:00Z"
        - name: lat
          in: query
          description: Latitude of the center point for spatial filtering. Requires lng and radius.
          schema:
            type: number
            minimum: -90
            maximum: 90
        - name: lng
          in: query
          description: Longitude of the center point for spatial filtering. Requires lat and radius.
          schema:
            type: number
            minimum: -180
            maximum: 180
        - name: radius
          in: query
          description: Radius in meters for spatial filtering. Maximum 50000. Requires lat and lng.
          schema:
            type: integer
            minimum: 1
            maximum: 50000
        - $ref: '#/components/parameters/offsetParam'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 20
      responses:
        "200":
          description: Paginated ping history
          content:
            application/json:
              example:
