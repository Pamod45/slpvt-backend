  /locations:
    post:
      tags: [Locations]
      summary: Submit a GPS ping
      description: Ingests a location ping from a tracking device. Authenticated via the X-Device-Key header. The device identity is resolved from the key — device_id must not be included in the body.
      security:
        - DeviceApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [location, battery_level, pinged_at]
              properties:
                location:
                  type: object
                  required: [type, coordinates]
                  properties:
                    type:
                      type: string
                      enum: [Point]
                    coordinates:
                      type: array
                      items:
                        type: number
                      minItems: 2
                      maxItems: 2
                      description: "[longitude, latitude]"
                battery_level:
                  type: integer
                  minimum: 0
                  maximum: 100
                pinged_at:
                  type: string
                  format: date-time
            example:
              location:
                type: Point
                coordinates: [79.8612, 6.9271]
              battery_level: 85
              pinged_at: "2026-05-02T08:14:00.000Z"
      responses:
        "201":
          description: Ping recorded
          content:
            application/json:
              example:
                message: Ping recorded
        "401":
          description: Missing or invalid X-Device-Key
          content:
            application/json:
              example:
                code: 401
                message: Invalid device API key
                description: null
                errors: []
        "403":
          description: Device is decommissioned or under repair
          content:
            application/json:
              example:
                code: 403
                message: Device has been decommissioned
                description: null
                errors: []
        "409":
          description: A ping from this device at this timestamp already exists
          content:
            application/json:
              example:
                code: 409
                message: A ping from this device at this timestamp already exists
                description: null
                errors: []
        "422":
          $ref: '#/components/responses/ValidationError'
        "429":
          $ref: '#/components/responses/RateLimit'

  /live-locations:
    get:
      tags: [Locations]
      summary: Get live vehicle locations within a jurisdiction
      description: Returns all vehicles that have pinged within the last 10 minutes and whose last known coordinates fall within the geographic boundary of the given jurisdiction. Exactly one of provinceSlug, districtSlug, or dsDivisionSlug must be provided.
      security:
        - BearerAuth: []
      parameters:
        - name: provinceSlug
          in: query
          schema:
            type: string
            example: western
        - name: districtSlug
          in: query
          schema:
            type: string
            example: colombo
        - name: dsDivisionSlug
          in: query
          schema:
            type: string
            example: colombo
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
      responses:
        "200":
          description: Live vehicle locations within the jurisdiction
          content:
            application/json:
              example:
                count: 43
                offset: 0
                limit: 20
                next: /slpvt/v1/live-locations?districtSlug=colombo&offset=20&limit=20
                previous: null
                data:
                  - registration_number: WP AAB-1234
                    police_status: CLEAN
                    coordinates:
                      latitude: 6.9271
                      longitude: 79.8612
                    battery_level: 85
                    pinged_at: "2026-05-02T08:14:00.000Z"
                    is_stale: false
                  - registration_number: WP BBC-5678
                    police_status: STOLEN
                    coordinates:
                      latitude: 6.9150
                      longitude: 79.8700
                    battery_level: 42
                    pinged_at: "2026-05-02T08:12:00.000Z"
                    is_stale: false
        "400":
          description: None or multiple jurisdiction slugs provided
          content:
            application/json:
              example:
                code: 422
                message: Validation failed
                description: One or more fields in the request are invalid
                errors:
                  - field: null
                    message: Exactly one of provinceSlug, districtSlug, or dsDivisionSlug is required
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          description: Jurisdiction not found or no boundary data available
          content:
            application/json:
              example:
                code: 404
                message: District not found
                description: null
                errors: []
        "429":
          $ref: '#/components/responses/RateLimit'

  /reports/boundary-crossings:
    get:
      tags: [Reports]
      summary: Boundary crossing report
      description: Returns all vehicle boundary crossing events within a given jurisdiction and time window. A crossing is detected when consecutive GPS pings show a vehicle moving from outside to inside the boundary (entry) or inside to outside (exit). Scope is enforced — provincial commanders cannot query outside their province, district commanders cannot query at the provincial level.
      security:
        - BearerAuth: []
      parameters:
        - name: provinceSlug
          in: query
          schema:
            type: string
            example: western
        - name: districtSlug
          in: query
          schema:
            type: string
            example: colombo
        - name: dsDivisionSlug
          in: query
          schema:
            type: string
            example: colombo
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
            example: "2026-04-28T00:00:00Z"
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
            example: "2026-04-29T00:00:00Z"
        - $ref: '#/components/parameters/offsetParam'
        - $ref: '#/components/parameters/limitParam'
      responses:
        "200":
          description: Paginated list of boundary crossing events ordered chronologically
          content:
            application/json:
              example:
                count: 12
                offset: 0
                limit: 20
                next: null
                previous: null
                data:
                  - registration_number: WP AAB-1234
                    police_status: CLEAN
                    event: entry
                    pinged_at: "2026-04-28T08:14:00.000Z"
                    coordinates:
                      latitude: 6.9271
                      longitude: 79.8612
                    battery_level: 85
                  - registration_number: WP AAB-1234
                    police_status: CLEAN
                    event: exit
                    pinged_at: "2026-04-28T14:32:00.000Z"
                    coordinates:
                      latitude: 6.9300
                      longitude: 79.8700
                    battery_level: 72
                  - registration_number: WP BBC-5678
                    police_status: STOLEN
                    event: entry
                    pinged_at: "2026-04-28T22:08:00.000Z"
                    coordinates:
                      latitude: 6.9150
                      longitude: 79.8500
                    battery_level: 31
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/ValidationError'
        "429":
          $ref: '#/components/responses/RateLimit'